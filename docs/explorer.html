<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOTAI Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#141b2d;--border:#1e2a42;--accent:#6c5ce7;--accent2:#00b894;--text:#e0e0e0;--muted:#7f8c9b;--danger:#e17055}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{background:linear-gradient(135deg,#141b2d 0%,#1a1040 100%);border-bottom:1px solid var(--border);padding:16px 0}
header .container{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:24px;font-weight:700;color:#fff}
.logo span{color:var(--accent)}
nav a{color:var(--muted);margin-left:20px;font-size:14px}nav a:hover{color:#fff}

.search-box{margin:30px 0;display:flex;gap:10px}
.search-box input{flex:1;padding:14px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:16px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box button{padding:14px 28px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:600}
.search-box button:hover{opacity:0.9}

.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:30px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .value{font-size:24px;font-weight:700;color:#fff}
.stat-card .label{font-size:12px;color:var(--muted);margin-top:4px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.card h2{font-size:18px;margin-bottom:16px;color:#fff}
.card h3{font-size:15px;margin-bottom:12px;color:var(--muted)}

.result-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.result-type{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase}
.type-tx{background:rgba(108,92,231,0.2);color:var(--accent)}
.type-address{background:rgba(0,184,148,0.2);color:var(--accent2)}
.type-contract{background:rgba(253,203,110,0.2);color:#fdcb6e}

.field{display:flex;border-bottom:1px solid var(--border);padding:10px 0}
.field:last-child{border:none}
.field .key{width:160px;color:var(--muted);font-size:13px;flex-shrink:0}
.field .val{font-size:13px;word-break:break-all;font-family:'Courier New',monospace}
.field .val.highlight{color:var(--accent);cursor:pointer}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:hover{background:rgba(108,92,231,0.05)}
.mono{font-family:'Courier New',monospace;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,184,148,0.2);color:var(--accent2)}
.badge-purple{background:rgba(108,92,231,0.2);color:var(--accent)}
.badge-orange{background:rgba(225,112,85,0.2);color:var(--danger)}
.amount{color:var(--accent2);font-weight:600}
.amount.negative{color:var(--danger)}

.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;cursor:pointer;color:var(--muted);font-size:14px;border-bottom:2px solid transparent;transition:all 0.2s}
.tab:hover{color:#fff}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}

.recent-list{max-height:500px;overflow-y:auto}
.tx-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.tx-row:last-child{border:none}
.tx-id{font-family:monospace;font-size:12px;color:var(--accent);cursor:pointer;width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis}
.tx-info{flex:1;font-size:13px}
.tx-amount{font-weight:600;color:var(--accent2);width:100px;text-align:right;flex-shrink:0}
.tx-time{color:var(--muted);font-size:11px;width:80px;text-align:right;flex-shrink:0}

#loading{text-align:center;padding:40px;color:var(--muted)}
#result{display:none}
#error{display:none;text-align:center;padding:40px;color:var(--danger)}
.empty{text-align:center;padding:30px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="container">
    <div class="logo"><span>IOTAI</span> Explorer</div>
    <nav>
      <a href="/">Home</a>
      <a href="/marketplace.html">Marketplace</a>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/visualizer">Visualizer</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search by transaction ID, address, or contract ID..." autofocus>
    <button onclick="search()">Search</button>
  </div>

  <div id="statsBar" class="stats-bar"></div>

  <div id="loading" style="display:none">Searching...</div>
  <div id="error"></div>
  <div id="result"></div>

  <div id="recentSection">
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('txs',this)">Recent Transactions</div>
        <div class="tab" onclick="switchTab('addresses',this)">Top Addresses</div>
        <div class="tab" onclick="switchTab('contracts',this)">Contracts</div>
        <div class="tab" onclick="switchTab('pipelines',this)">Pipelines</div>
      </div>
      <div id="tab-txs" class="tab-content active"><div class="recent-list" id="recentTxs"><div class="empty">Loading...</div></div></div>
      <div id="tab-addresses" class="tab-content"><div id="topAddresses"><div class="empty">Loading...</div></div></div>
      <div id="tab-contracts" class="tab-content"><div id="contractsList"><div class="empty">Loading...</div></div></div>
      <div id="tab-pipelines" class="tab-content"><div id="pipelinesList"><div class="empty">Loading...</div></div></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function short(str, n = 12) {
  if (!str) return '';
  return str.length > n * 2 ? str.substring(0, n) + '...' + str.substring(str.length - 6) : str;
}

async function api(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error((await res.json()).error || 'Not found');
  return res.json();
}

async function loadStats() {
  try {
    const [net, fees, market, contracts, orch] = await Promise.all([
      api('/api/v1/network/stats'),
      api('/api/v1/fees').catch(() => null),
      api('/api/v1/marketplace/stats').catch(() => null),
      api('/api/v1/contracts/stats').catch(() => null),
      api('/api/v1/orchestrator/stats').catch(() => null),
    ]);
    const stats = [
      { label: 'Transactions', value: net.totalTransactions || 0 },
      { label: 'Active Tips', value: net.activeTips || 0 },
      { label: 'Addresses', value: net.knownAddresses || 0 },
      { label: 'Fee Pool', value: (fees?.feePool || 0).toLocaleString() + ' IOTAI' },
      { label: 'Marketplace Sales', value: market?.totalSales || 0 },
      { label: 'Smart Contracts', value: contracts?.totalContracts || 0 },
      { label: 'Pipelines', value: orch?.totalPipelines || 0 },
    ];
    document.getElementById('statsBar').innerHTML = stats.map(s =>
      `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`
    ).join('');
  } catch(e) { console.error('Stats error:', e); }
}

async function loadRecent() {
  try {
    const data = await api('/api/v1/visualizer/data');
    const txs = data.nodes
      .filter(n => n.type !== 'genesis')
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
      .slice(0, 50);

    if (txs.length === 0) {
      document.getElementById('recentTxs').innerHTML = '<div class="empty">No transactions yet</div>';
      return;
    }

    document.getElementById('recentTxs').innerHTML = txs.map(tx => `
      <div class="tx-row">
        <div class="tx-id" onclick="searchById('${tx.id}')" title="${tx.id}">${short(tx.id, 10)}</div>
        <div class="tx-info">
          <span class="mono" style="color:var(--muted)">${short(tx.from || '', 8)}</span>
          ${tx.to ? ` → <span class="mono">${short(tx.to, 8)}</span>` : ''}
          ${tx.metadata?.purpose ? `<span style="color:var(--muted);font-size:11px;margin-left:8px">${tx.metadata.purpose}</span>` : ''}
        </div>
        <div class="tx-amount">${tx.amount ? tx.amount.toLocaleString() + ' IOTAI' : 'data'}</div>
        <div class="tx-time">${tx.timestamp ? timeAgo(tx.timestamp) : ''}</div>
      </div>
    `).join('');
  } catch(e) { document.getElementById('recentTxs').innerHTML = '<div class="empty">Error loading</div>'; }
}

async function loadTopAddresses() {
  try {
    const data = await api('/api/v1/dag/top-addresses');
    const list = Array.isArray(data) ? data : (data.addresses || []);
    if (list.length === 0) { document.getElementById('topAddresses').innerHTML = '<div class="empty">No data</div>'; return; }
    document.getElementById('topAddresses').innerHTML = `<table>
      <tr><th>#</th><th>Address</th><th>Balance</th><th>Txs</th></tr>
      ${list.slice(0, 20).map((a, i) => `<tr>
        <td>${i + 1}</td>
        <td><span class="mono highlight" onclick="searchById('${a.address}')" style="color:var(--accent);cursor:pointer">${short(a.address, 16)}</span></td>
        <td class="amount">${(a.balance || 0).toLocaleString()} IOTAI</td>
        <td>${a.txCount || 0}</td>
      </tr>`).join('')}
    </table>`;
  } catch(e) { document.getElementById('topAddresses').innerHTML = '<div class="empty">Error loading</div>'; }
}

async function loadContracts() {
  try {
    const data = await api('/api/v1/contracts/stats');
    document.getElementById('contractsList').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
        <div class="stat-card"><div class="value">${data.active || 0}</div><div class="label">Active</div></div>
        <div class="stat-card"><div class="value">${data.completed || 0}</div><div class="label">Completed</div></div>
        <div class="stat-card"><div class="value">${data.totalExecutions || 0}</div><div class="label">Executions</div></div>
      </div>
      <p style="color:var(--muted);font-size:13px;text-align:center">Deploy contracts via API or SDK to see them here</p>`;
  } catch(e) { document.getElementById('contractsList').innerHTML = '<div class="empty">No contract data</div>'; }
}

async function loadPipelines() {
  try {
    const data = await api('/api/v1/orchestrator/stats');
    document.getElementById('pipelinesList').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
        <div class="stat-card"><div class="value">${data.activePipelines || 0}</div><div class="label">Active</div></div>
        <div class="stat-card"><div class="value">${data.completedPipelines || 0}</div><div class="label">Completed</div></div>
        <div class="stat-card"><div class="value">${data.totalWorkers || 0}</div><div class="label">Workers</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
        <div class="stat-card"><div class="value">${data.completedTasks || 0}/${data.totalTasks || 0}</div><div class="label">Tasks Done</div></div>
        <div class="stat-card"><div class="value">${(data.totalPaid || 0).toLocaleString()}</div><div class="label">IOTAI Paid</div></div>
      </div>`;
  } catch(e) { document.getElementById('pipelinesList').innerHTML = '<div class="empty">No pipeline data</div>'; }
}

function searchById(id) {
  document.getElementById('searchInput').value = id;
  search();
}

async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const resultEl = document.getElementById('result');
  const errorEl = document.getElementById('error');
  const loadingEl = document.getElementById('loading');
  const recentEl = document.getElementById('recentSection');

  loadingEl.style.display = 'block';
  resultEl.style.display = 'none';
  errorEl.style.display = 'none';

  try {
    // Try transaction first
    if (q.length > 20 && !q.startsWith('iotai_')) {
      try {
        const tx = await api(`/api/v1/tx/${q}`);
        showTransaction(tx);
        recentEl.style.display = 'none';
        return;
      } catch(e) {}
    }

    // Try address
    if (q.startsWith('iotai_') || q.length < 20) {
      try {
        const addr = await api(`/api/v1/address/${q}`);
        if (addr && (addr.balance !== undefined || addr.address)) {
          showAddress(q, addr);
          recentEl.style.display = 'none';
          return;
        }
      } catch(e) {}
    }

    // Try as tx anyway
    try {
      const tx = await api(`/api/v1/tx/${q}`);
      showTransaction(tx);
      recentEl.style.display = 'none';
      return;
    } catch(e) {}

    // Try address as fallback
    try {
      const addr = await api(`/api/v1/address/${q}`);
      if (addr) {
        showAddress(q, addr);
        recentEl.style.display = 'none';
        return;
      }
    } catch(e) {}

    throw new Error('Not found. Try a valid transaction ID or address.');
  } catch(e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
    resultEl.style.display = 'none';
  } finally {
    loadingEl.style.display = 'none';
  }
}

function showTransaction(tx) {
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div class="card">
      <div class="result-header">
        <span class="result-type type-tx">Transaction</span>
        <span class="badge ${tx.type === 'transfer' ? 'badge-green' : 'badge-purple'}">${tx.type || 'transfer'}</span>
        ${tx.cumulativeWeight >= 5 ? '<span class="badge badge-green">Confirmed</span>' : '<span class="badge badge-orange">Pending</span>'}
      </div>
      <div class="field"><div class="key">Transaction ID</div><div class="val mono">${tx.id}</div></div>
      <div class="field"><div class="key">From</div><div class="val mono highlight" onclick="searchById('${tx.from}')">${tx.from || 'genesis'}</div></div>
      ${tx.to ? `<div class="field"><div class="key">To</div><div class="val mono highlight" onclick="searchById('${tx.to}')">${tx.to}</div></div>` : ''}
      ${tx.amount ? `<div class="field"><div class="key">Amount</div><div class="val amount">${tx.amount.toLocaleString()} IOTAI</div></div>` : ''}
      ${tx.fee ? `<div class="field"><div class="key">Fee</div><div class="val">${tx.fee} IOTAI</div></div>` : ''}
      <div class="field"><div class="key">Timestamp</div><div class="val">${tx.timestamp ? new Date(tx.timestamp).toLocaleString() + ' (' + timeAgo(tx.timestamp) + ')' : 'N/A'}</div></div>
      <div class="field"><div class="key">Weight</div><div class="val">${tx.weight || 1}</div></div>
      <div class="field"><div class="key">Cumulative Weight</div><div class="val">${tx.cumulativeWeight || 1}</div></div>
      ${tx.parents ? `<div class="field"><div class="key">Parents</div><div class="val">${tx.parents.map(p => `<span class="mono highlight" onclick="searchById('${p}')" style="display:block;margin-bottom:4px">${short(p, 20)}</span>`).join('')}</div></div>` : ''}
      ${tx.metadata && Object.keys(tx.metadata).length > 0 ? `<div class="field"><div class="key">Metadata</div><div class="val"><pre style="white-space:pre-wrap;font-size:12px;color:var(--muted)">${JSON.stringify(tx.metadata, null, 2)}</pre></div></div>` : ''}
    </div>
    <a href="#" onclick="clearSearch();return false" style="font-size:13px">← Back to explorer</a>`;
}

function showAddress(addr, data) {
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';

  const txList = data.transactions || data.history || [];
  resultEl.innerHTML = `
    <div class="card">
      <div class="result-header">
        <span class="result-type type-address">Address</span>
      </div>
      <div class="field"><div class="key">Address</div><div class="val mono">${addr}</div></div>
      <div class="field"><div class="key">Balance</div><div class="val amount" style="font-size:18px">${(data.balance || 0).toLocaleString()} IOTAI</div></div>
      <div class="field"><div class="key">Total Sent</div><div class="val">${(data.totalSent || 0).toLocaleString()} IOTAI</div></div>
      <div class="field"><div class="key">Total Received</div><div class="val">${(data.totalReceived || 0).toLocaleString()} IOTAI</div></div>
      <div class="field"><div class="key">Transactions</div><div class="val">${data.txCount || txList.length || 0}</div></div>
    </div>
    ${txList.length > 0 ? `<div class="card"><h2>Transaction History</h2>
      <table>
        <tr><th>TX ID</th><th>Type</th><th>Counterparty</th><th>Amount</th><th>Time</th></tr>
        ${txList.slice(0, 50).map(tx => `<tr>
          <td><span class="mono highlight" onclick="searchById('${tx.id || tx.txId}')">${short(tx.id || tx.txId, 10)}</span></td>
          <td><span class="badge ${tx.type === 'transfer' ? 'badge-green' : 'badge-purple'}">${tx.type || '?'}</span></td>
          <td class="mono">${tx.from === addr ? short(tx.to, 10) : short(tx.from, 10)}</td>
          <td class="${tx.from === addr ? 'amount negative' : 'amount'}">${tx.from === addr ? '-' : '+'}${(tx.amount || 0).toLocaleString()}</td>
          <td style="color:var(--muted)">${tx.timestamp ? timeAgo(tx.timestamp) : ''}</td>
        </tr>`).join('')}
      </table>
    </div>` : ''}
    <a href="#" onclick="clearSearch();return false" style="font-size:13px">← Back to explorer</a>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('recentSection').style.display = 'block';
}

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') search();
});

// Init
loadStats();
loadRecent();
loadTopAddresses();
loadContracts();
loadPipelines();
setInterval(loadStats, 15000);
setInterval(loadRecent, 10000);
</script>
<script src="/js/browser-node.js"></script>
</body>
</html>
